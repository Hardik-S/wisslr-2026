<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wisslr Event Submission</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css?v=20260307f" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow" data-copy-key="page.eyebrow"></p>
          <h1 data-copy-key="page.title"></h1>
          <p class="hero-warning" data-copy-key="page.description"></p>
        </div>
        <img
          class="hero-badge"
          src="./assets/wuglife.jpg"
          alt="WUGLIFE"
          data-copy-alt="page.headerImageAlt"
        />
      </header>

      <main class="wizard-shell">
        <form id="eventForm" class="wizard-form" novalidate>
          <p id="stepCounter" class="step-counter"></p>

          <section class="form-step active" data-step-index="0">
            <h2 data-copy-key="form.name.title"></h2>
            <div class="field-group">
              <label for="participantName" data-copy-key="form.name.label"></label>
              <input
                id="participantName"
                name="participantName"
                type="text"
                maxlength="80"
                required
                data-copy-placeholder="form.name.placeholder"
              />
            </div>
          </section>

          <section class="form-step" data-step-index="1">
            <h2 data-copy-key="game.section.title"></h2>
            <p class="section-note" data-copy-key="game.section.description"></p>

            <button id="playClueButton" type="button" data-copy-key="game.playButton"></button>
            <p id="statusText" class="status" aria-live="polite"></p>
            <p id="feedbackText" class="feedback" aria-live="polite"></p>

            <div class="map-wrap">
              <div id="map" role="application" aria-label="World map" data-copy-aria-label="game.mapAriaLabel"></div>
            </div>

            <button id="submitMapGuessButton" class="map-submit-button" type="button" data-copy-key="game.submitGuessButton"></button>

            <div class="field-group">
              <label for="mapLanguageAnswer" data-copy-key="game.languageQuestionLabel"></label>
              <input
                id="mapLanguageAnswer"
                name="mapLanguageAnswer"
                type="text"
                required
                data-copy-placeholder="game.languageQuestionPlaceholder"
              />
            </div>

            <input id="mapCountrySelection" name="mapCountrySelection" type="hidden" value="" />
            <input id="languageGuessOutcome" name="languageGuessOutcome" type="hidden" value="not_submitted" />
          </section>

          <section class="form-step" data-step-index="2">
            <h2 data-copy-key="q1.title"></h2>
            <p class="section-note" data-copy-key="q1.description"></p>
            <div class="field-grid">
              <div class="field-group">
                <label for="q1Field1" data-copy-key="q1.field1.label"></label>
                <input id="q1Field1" name="q1Field1" type="text" required data-copy-placeholder="q1.field1.placeholder" />
              </div>
              <div class="field-group">
                <label for="q1Field2" data-copy-key="q1.field2.label"></label>
                <input id="q1Field2" name="q1Field2" type="text" required data-copy-placeholder="q1.field2.placeholder" />
              </div>
              <div class="field-group">
                <label for="q1Field3" data-copy-key="q1.field3.label"></label>
                <input id="q1Field3" name="q1Field3" type="text" required data-copy-placeholder="q1.field3.placeholder" />
              </div>
            </div>
          </section>

          <section class="form-step" data-step-index="3">
            <h2 data-copy-key="q2.title"></h2>
            <p class="section-note" data-copy-key="q2.description"></p>
            <div class="field-grid">
              <div class="field-group">
                <label for="q2Field1" data-copy-key="q2.field1.label"></label>
                <input id="q2Field1" name="q2Field1" type="text" required data-copy-placeholder="q2.field1.placeholder" />
              </div>
              <div class="field-group">
                <label for="q2Field2" data-copy-key="q2.field2.label"></label>
                <input id="q2Field2" name="q2Field2" type="text" required data-copy-placeholder="q2.field2.placeholder" />
              </div>
              <div class="field-group">
                <label for="q2Field3" data-copy-key="q2.field3.label"></label>
                <input id="q2Field3" name="q2Field3" type="text" required data-copy-placeholder="q2.field3.placeholder" />
              </div>
            </div>
          </section>

          <section class="form-step" data-step-index="4">
            <h2 data-copy-key="q3.title"></h2>
            <div class="field-grid">
              <div class="field-group">
                <label for="q3Field1" data-copy-key="q3.field1.label"></label>
                <input id="q3Field1" name="q3Field1" type="text" required data-copy-placeholder="q3.field1.placeholder" />
              </div>
              <div class="field-group">
                <label for="q3Field2" data-copy-key="q3.field2.label"></label>
                <input id="q3Field2" name="q3Field2" type="text" required data-copy-placeholder="q3.field2.placeholder" />
              </div>
            </div>
          </section>

          <section class="form-step" data-step-index="5">
            <h2 data-copy-key="history.title"></h2>
            <p class="section-note" data-copy-key="history.description"></p>
            <div class="map-wrap history-map-wrap">
              <div id="historyMap" role="application" aria-label="Recent map answers"></div>
            </div>
            <ul id="historyLegend" class="history-legend"></ul>

            <h2 data-copy-key="review.title"></h2>
            <p class="section-note" data-copy-key="review.description"></p>
            <div id="reviewScoreCard" class="review-score-card"></div>
            <div id="reviewSummary" class="review-summary"></div>
          </section>

          <p id="formFeedback" class="feedback form-feedback" aria-live="polite"></p>

          <div class="wizard-nav">
            <button id="nextStepButton" class="nav-button" type="button" data-copy-key="wizard.nextButton"></button>
            <button id="submitFormButton" class="submit-button" type="submit" data-copy-key="form.submitButton" hidden></button>
          </div>
        </form>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js?v=20260307f"></script>
  </body>
</html>
