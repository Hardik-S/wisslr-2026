<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Country Sound Match - Prototype</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="hero">
        <p class="eyebrow">Prototype</p>
        <h1>Country Sound Match</h1>
        <p>
          Hear the Kannada audio clip, then click the right country on the map. For this first prototype, the target country is always <strong>India</strong>.
        </p>
      </header>

      <main class="layout">
        <aside class="panel">
          <section>
            <h2>Players</h2>
            <div class="row">
              <label class="sr-only" for="playerName">Player name</label>
              <input id="playerName" type="text" placeholder="Enter player name" maxlength="24" />
              <button id="addPlayerButton" type="button">Add</button>
            </div>
            <ul id="playerList" class="scoreboard"></ul>
          </section>

          <section>
            <h2>Game</h2>
            <div class="button-grid">
              <button id="startGameButton" type="button">Start Game</button>
              <button id="playClueButton" type="button">Play Audio Clue</button>
              <button id="resetScoresButton" type="button">Reset Scores</button>
            </div>
            <p id="statusText" class="status">Add at least one player to begin.</p>
            <p id="feedbackText" class="feedback" aria-live="polite"></p>
          </section>
        </aside>

        <section class="map-wrap">
          <div id="map" role="application" aria-label="World map"></div>
        </section>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
